name: ZtoxiOS
options:
  bundleIdPrefix: io.github.whisxeybob
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    ENABLE_BITCODE: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  ZtoxiOS:
    type: application
    platform: iOS
    sources:
      - ZtoxiOS
    info:
      path: ZtoxiOS/Info.plist
      properties:
        CFBundleDisplayName: ztox
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "ztox uses the camera for video calls and QR scanning of Tox IDs."
        NSMicrophoneUsageDescription: "ztox uses the microphone for audio calls."
        NSPhotoLibraryUsageDescription: "ztox uses the photo library to send images."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.whisxeybob.ztox
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SUPPORTS_MACCATALYST: NO
        # Will be added once scripts/build-toxcore-xcframework.sh has run:
        # FRAMEWORK_SEARCH_PATHS: "$(SRCROOT)/Frameworks"
        # OTHER_LDFLAGS: "-framework CToxcore"
    dependencies:
      # Uncomment once the xcframework is built:
      # - framework: Frameworks/CToxcore.xcframework
      #   embed: true
