; ztox shared Nord palette — canonical source of truth.
; Reference: https://www.nordtheme.com/docs/colors-and-palettes
;
; Polar Night   — dark base (background, panels, gutters)
; Snow Storm    — light foreground (text, on-dark UI)
; Frost         — primary accents (links, focus, active state)
; Aurora        — semantic accents (error, warn, ok, info, special)
;
; Desktop (qTox QSS) and iOS (SwiftUI) clients both derive their
; concrete palette files from this one. Edit here first, propagate down.

[polar_night]
nord0 = "#2E3440"
nord1 = "#3B4252"
nord2 = "#434C5E"
nord3 = "#4C566A"

[snow_storm]
nord4 = "#D8DEE9"
nord5 = "#E5E9F0"
nord6 = "#ECEFF4"

[frost]
nord7  = "#8FBCBB"
nord8  = "#88C0D0"
nord9  = "#81A1C1"
nord10 = "#5E81AC"

[aurora]
nord11 = "#BF616A"
nord12 = "#D08770"
nord13 = "#EBCB8B"
nord14 = "#A3BE8C"
nord15 = "#B48EAD"

[roles]
; Semantic mapping used by both clients.
bg_primary        = "#2E3440"
bg_secondary      = "#3B4252"
bg_tertiary       = "#434C5E"
surface_raised    = "#4C566A"
text_primary      = "#ECEFF4"
text_secondary    = "#D8DEE9"
text_muted        = "#4C566A"
accent_primary    = "#88C0D0"
accent_hover      = "#8FBCBB"
accent_active     = "#5E81AC"
link              = "#81A1C1"
status_online     = "#A3BE8C"
status_busy       = "#BF616A"
status_away       = "#EBCB8B"
status_offline    = "#4C566A"
transfer_good     = "#A3BE8C"
transfer_wait     = "#EBCB8B"
transfer_bad      = "#BF616A"
transfer_middle   = "#4C566A"
