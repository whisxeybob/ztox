name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  macos:
    name: macOS (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew update
          brew install cmake ninja pkg-config qt@6 libsodium libvpx opus ffmpeg \
                       sqlcipher openal-soft qrencode libexif toxcore

      - name: Configure
        working-directory: desktop
        run: |
          cmake -B _build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)"

      - name: Build
        working-directory: desktop
        run: cmake --build _build --parallel

      - name: Package .dmg
        working-directory: desktop
        run: |
          cd _build
          # cmake --install runs create-dmg via cmake/Installation.cmake.
          cmake --install . || true
          ls -la *.dmg 2>/dev/null || true

      - name: Upload artifact (.app bundle)
        uses: actions/upload-artifact@v4
        with:
          name: ztox-macos-arm64-app
          path: desktop/_build/ztox.app

      - name: Upload artifact (.dmg)
        if: hashFiles('desktop/_build/*.dmg') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ztox-macos-arm64-dmg
          path: desktop/_build/*.dmg

  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config git ca-certificates \
            qt6-base-dev qt6-tools-dev qt6-tools-dev-tools qt6-l10n-tools \
            libqt6svg6-dev libqt6opengl6-dev \
            libsodium-dev libopus-dev libvpx-dev libavcodec-dev libavformat-dev \
            libavutil-dev libswscale-dev libavdevice-dev \
            libsqlcipher-dev libopenal-dev libqrencode-dev libexif-dev \
            libxss-dev libgtk-3-dev wget file

      - name: Build c-toxcore from source
        run: |
          git clone --depth=1 --recurse-submodules https://github.com/TokTok/c-toxcore.git /tmp/c-toxcore
          cmake -S /tmp/c-toxcore -B /tmp/c-toxcore/_build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBOOTSTRAP_DAEMON=OFF -DAUTOTEST=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/c-toxcore/_build --parallel
          sudo cmake --install /tmp/c-toxcore/_build

      - name: Configure
        working-directory: desktop
        run: |
          cmake -B _build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        working-directory: desktop
        run: cmake --build _build --parallel

      - name: Make AppImage
        working-directory: desktop
        run: |
          DESTDIR=$PWD/AppDir cmake --install _build
          # Download linuxdeploy + Qt plugin
          curl -fsSL -o linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o linuxdeploy-plugin-qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt
          # extract to avoid FUSE
          ./linuxdeploy --appimage-extract-and-run \
            --appdir AppDir \
            --plugin qt \
            --desktop-file AppDir/usr/share/applications/io.github.whisxeybob.ztox.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/ztox.png \
            --output appimage

      - name: Upload artifact (.AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: ztox-linux-x86_64-appimage
          path: desktop/ztox*.AppImage

  windows:
    name: Windows (x86_64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup vcpkg (manual clone, avoids action SHA pinning)
        shell: bash
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"

      - name: Install audio/codec deps via vcpkg
        shell: bash
        run: |
          "$VCPKG_ROOT/vcpkg.exe" install \
            libsodium:x64-windows opus:x64-windows libvpx:x64-windows \
            sqlcipher:x64-windows openal-soft:x64-windows ffmpeg:x64-windows \
            libqrencode:x64-windows libexif:x64-windows

      - name: Build c-toxcore from source
        shell: bash
        run: |
          git clone --depth=1 --recurse-submodules https://github.com/TokTok/c-toxcore.git /c/c-toxcore
          cmake -S /c/c-toxcore -B /c/c-toxcore/_build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-windows \
            -DBOOTSTRAP_DAEMON=OFF -DAUTOTEST=OFF \
            -DCMAKE_INSTALL_PREFIX=/c/toxcore-install
          cmake --build /c/c-toxcore/_build --parallel
          cmake --install /c/c-toxcore/_build

      - name: Configure and build ztox
        shell: bash
        working-directory: desktop
        run: |
          cmake -B _build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-windows \
            -DCMAKE_PREFIX_PATH="/c/toxcore-install"
          cmake --build _build --parallel

      - name: Bundle with windeployqt
        shell: bash
        working-directory: desktop
        run: |
          mkdir -p dist/ztox
          cp _build/ztox.exe dist/ztox/
          windeployqt --release --no-translations --no-system-d3d-compiler \
            --no-compiler-runtime dist/ztox/ztox.exe
          cd dist && 7z a -tzip ../ztox-windows-x86_64.zip ztox/

      - name: Upload artifact (.zip)
        uses: actions/upload-artifact@v4
        with:
          name: ztox-windows-x86_64-zip
          path: desktop/ztox-windows-x86_64.zip

  release:
    name: Release
    needs: [macos, linux, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Stage release files
        run: |
          mkdir -p release
          find artifacts -name 'ztox*' -type f -exec cp {} release/ \;
          ls -la release/
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" release/* \
            --title "ztox $tag" \
            --notes "Automatic release from CI. Source-build installers: install.sh / install.ps1."
